---
- name: Enable audit process creation
  ansible.windows.win_command: auditpol /set /subcategory:"Process Creation" /success:enable /failure:enable

- name: Enable audit process termination
  ansible.windows.win_command: auditpol /set /subcategory:"Process Termination" /success:enable /failure:enable

- name: Enable audit logon
  ansible.windows.win_command: auditpol /set /subcategory:"Logon" /success:enable /failure:enable

- name: Enable audit logoff
  ansible.windows.win_command: auditpol /set /subcategory:"Logoff" /success:enable /failure:enable

- name: Enable audit account lockout
  ansible.windows.win_command: auditpol /set /subcategory:"Account Lockout" /success:enable /failure:enable

- name: Enable audit special logon
  ansible.windows.win_command: auditpol /set /subcategory:"Special Logon" /success:enable /failure:enable

- name: Enable audit account management
  ansible.windows.win_command: auditpol /set /category:"Account Management" /success:enable /failure:enable

- name: Enable audit directory service access
  ansible.windows.win_command: auditpol /set /category:"DS Access" /success:enable /failure:enable

- name: Enable audit policy change
  ansible.windows.win_command: auditpol /set /category:"Policy Change" /success:enable /failure:enable

- name: Enable command line in process creation events
  ansible.windows.win_regedit:
    path: HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\System\Audit
    name: ProcessCreationIncludeCmdLine_Enabled
    data: 1
    type: dword

- name: Enable PowerShell script block logging
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging
    name: EnableScriptBlockLogging
    data: 1
    type: dword

- name: Enable PowerShell module logging
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\ModuleLogging
    name: EnableModuleLogging
    data: 1
    type: dword

- name: Configure PowerShell module logging module names
  ansible.windows.win_regedit:
    path: HKLM:\Software\Policies\Microsoft\Windows\PowerShell\ModuleLogging\ModuleNames
    name: "*"
    data: "*"
    type: string

- name: Increase Security log size
  ansible.windows.win_command: wevtutil sl Security /ms:268435456

- name: Increase System log size
  ansible.windows.win_command: wevtutil sl System /ms:134217728

- name: Increase Application log size
  ansible.windows.win_command: wevtutil sl Application /ms:134217728

- name: Increase PowerShell Operational log size
  ansible.windows.win_command: wevtutil sl Microsoft-Windows-PowerShell/Operational /ms:134217728

- name: Increase Windows PowerShell log size
  ansible.windows.win_command: wevtutil sl "Windows PowerShell" /ms:134217728
  ignore_errors: yes
